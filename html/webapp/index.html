<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Cosmonaut</title>
    <link href="styles.css" rel="stylesheet" type="text/css">
    <script src="soundmanager2-setup.js"></script>
    <script src="soundmanager2-jsmin.js"></script>
</head>
<body>
<div id="page-root">
    <div id="embed-html"></div>
    <div id="rotate-hint">Rotate device to landscape</div>
</div>
<script type="text/javascript" src="html/html.nocache.js"></script>
<script>
    const embed = document.getElementById('embed-html');
    embed.addEventListener('contextmenu', function(evt) {
        evt.preventDefault();
    }, false);

    const isLikelyMobile = /Android|iPhone|iPad|iPod|Mobile|Silk|Kindle|Opera Mini/i.test(navigator.userAgent || '')
        || ('maxTouchPoints' in navigator && navigator.maxTouchPoints > 1);

    let immersiveRequested = false;
    let immersiveRequestInFlight = false;
    let lastImmersiveAttemptAt = 0;
    const IMMERSIVE_RETRY_MS = 350;

    async function requestFullscreenOnElement(element) {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            return true;
        }

        const requestFn = element.requestFullscreen || element.webkitRequestFullscreen || element.msRequestFullscreen;
        if (!requestFn) {
            return false;
        }

        try {
            const result = requestFn.call(element, { navigationUI: 'hide' });
            if (result && typeof result.then === 'function') {
                await result;
            }
        } catch (firstError) {
            try {
                const result = requestFn.call(element);
                if (result && typeof result.then === 'function') {
                    await result;
                }
            } catch (secondError) {
                return false;
            }
        }

        return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    async function requestImmersiveLandscape() {
        if (!isLikelyMobile || immersiveRequestInFlight) {
            return;
        }

        if (immersiveRequested && (document.fullscreenElement || document.webkitFullscreenElement)) {
            return;
        }

        const now = Date.now();
        if (now - lastImmersiveAttemptAt < IMMERSIVE_RETRY_MS) return;
        lastImmersiveAttemptAt = now;
        immersiveRequestInFlight = true;

        const root = document.documentElement;
        const fullscreenTarget = document.getElementById('embed-html') || root;
        try {
            const enteredFullscreen = await requestFullscreenOnElement(fullscreenTarget);
            immersiveRequested = enteredFullscreen;

            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) {
                // Ignore unsupported orientation locking.
            }

            // Extra nudge for Android browsers that keep browser chrome visible until scroll/resize.
            window.scrollTo(0, 1);
            setTimeout(function () {
                window.scrollTo(0, 1);
                window.dispatchEvent(new Event('resize'));
            }, 60);
        } finally {
            immersiveRequestInFlight = false;
        }
    }

    function triggerImmersiveRequest() {
        requestImmersiveLandscape();
    }

    function updateRotateHint() {
        const rotateHint = document.getElementById('rotate-hint');
        if (!rotateHint) return;
        const portrait = window.matchMedia('(orientation: portrait)').matches;
        rotateHint.style.display = portrait ? 'flex' : 'none';
    }

    window.addEventListener('touchstart', triggerImmersiveRequest, { passive: true });
    window.addEventListener('pointerdown', triggerImmersiveRequest, { passive: true });
    window.addEventListener('click', triggerImmersiveRequest, { passive: true });
    window.addEventListener('mousedown', triggerImmersiveRequest, { passive: true });
    window.addEventListener('touchend', triggerImmersiveRequest, { passive: true });
    window.addEventListener('pointerup', triggerImmersiveRequest, { passive: true });
    window.addEventListener('keydown', triggerImmersiveRequest);
    window.addEventListener('orientationchange', function () {
        updateRotateHint();
        triggerImmersiveRequest();
    });
    window.addEventListener('resize', function () {
        updateRotateHint();
        triggerImmersiveRequest();
    });
    window.addEventListener('focus', triggerImmersiveRequest);
    updateRotateHint();

    document.addEventListener('fullscreenchange', function () {
        if (!document.fullscreenElement) {
            immersiveRequested = false;
        }
    });
    document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') {
            triggerImmersiveRequest();
        }
    });
</script>
</body>
</html>
