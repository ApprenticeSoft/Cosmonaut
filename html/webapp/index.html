<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Cosmonaut</title>
    <link href="styles.css" rel="stylesheet" type="text/css">
    <script src="soundmanager2-setup.js"></script>
    <script src="soundmanager2-jsmin.js"></script>
</head>
<body>
<div id="page-root">
    <div id="embed-html"></div>
</div>
<script type="text/javascript" src="html/html.nocache.js"></script>
<script>
    const embed = document.getElementById('embed-html');
    embed.addEventListener('contextmenu', function(evt) {
        evt.preventDefault();
    }, false);

    let immersiveRequested = false;

    async function requestImmersiveLandscape() {
        if (immersiveRequested) {
            return;
        }
        immersiveRequested = true;

        const root = document.documentElement;
        try {
            if (!document.fullscreenElement) {
                if (root.requestFullscreen) {
                    await root.requestFullscreen({ navigationUI: 'hide' });
                } else if (root.webkitRequestFullscreen) {
                    root.webkitRequestFullscreen();
                } else {
                    immersiveRequested = false;
                }
            }
        } catch (err) {
            // Allow retry after a blocked fullscreen request.
            immersiveRequested = false;
        }

        try {
            if (screen.orientation && screen.orientation.lock) {
                await screen.orientation.lock('landscape');
            }
        } catch (err) {
            // Ignore unsupported orientation locking.
        }
    }

    function triggerImmersiveRequest() {
        requestImmersiveLandscape();
    }

    window.addEventListener('click', triggerImmersiveRequest, { once: true });
    window.addEventListener('keydown', triggerImmersiveRequest, { once: true });

    document.addEventListener('fullscreenchange', function () {
        if (!document.fullscreenElement) {
            immersiveRequested = false;
        }
    });
</script>
</body>
</html>
